<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0f172a">
  <title>Flyra | Reiseplaner</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="styles.css">
</head>
<body class="planner-page">
  <header class="site-header">
    <a class="brand" href="index.html">Flyra</a>
    <a class="header-link" href="index.html">Zurück zur Startseite</a>
  </header>

  <main class="planner-shell">
    <section class="card form-card">
      <p class="eyebrow">Planer</p>
      <h1>Erstelle deinen Reiseplan</h1>
      <p class="lead">
        Trage Zielort, Reisedauer und Budget ein. Flyra erstellt sofort einen
        strukturierten Plan mit Budgetsplit.
      </p>

      <form id="trip-form" novalidate>
        <label for="destination">Reiseziel</label>
        <input id="destination" name="destination" type="text" placeholder="z. B. Barcelona" required>
        <p id="destination-type-hint" class="destination-type-hint is-hidden" aria-live="polite"></p>

        <label for="days">Reisedauer (Tage)</label>
        <input id="days" name="days" type="number" min="1" max="30" step="1" placeholder="z. B. 7" required>

        <label for="budget">Gesamtbudget (EUR)</label>
        <input id="budget" name="budget" type="number" min="0.01" step="0.01" placeholder="z. B. 1500" required>

        <label for="trip-type">Reisetyp</label>
        <select id="trip-type" name="type">
          <option value="city" selected>City</option>
          <option value="beach">Strand</option>
          <option value="nature">Natur</option>
          <option value="food">Food</option>
          <option value="surprise">Überraschung</option>
        </select>

        <div id="error-box" class="error-box is-hidden" role="alert" aria-live="polite"></div>

        <div class="form-actions">
          <button class="btn-primary" type="submit">Plan generieren</button>
          <button id="reset-plan" class="btn-secondary is-hidden" type="button">Neu planen</button>
        </div>
      </form>
    </section>

    <section id="result-box" class="card result-card result-shell is-hidden" role="region" aria-label="Ergebnisbereich" aria-live="polite"></section>
  </main>

  <footer class="site-footer site-footer--links">
    <div class="site-footer-row">
      <span>&copy; Flyra</span>
      <nav class="footer-links" aria-label="Rechtliche Links">
        <a href="impressum.html">Impressum</a>
        <a href="datenschutz.html">Datenschutz</a>
      </nav>
    </div>
  </footer>

  <script>
    window.FLYRA_SUPABASE_URL = window.FLYRA_SUPABASE_URL || "";
    window.FLYRA_SUPABASE_ANON_KEY = window.FLYRA_SUPABASE_ANON_KEY || "";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
  <script src="app.js" defer></script>
  <script src="planner.js" defer></script>
</body>
</html>
